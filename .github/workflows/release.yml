name: Release

# Baut, signiert, notarisiert Logbuch Loader und veröffentlicht ein GitHub-Release,
# sobald ein Tag `vX.Y.Z` gepusht wird. Der Appcast wird neu erzeugt und nach main
# committet. Die eigentliche Build-/Signierlogik liegt in scripts/release.sh.
#
# Benötigte Repository-Secrets (Settings → Secrets and variables → Actions):
#   MACOS_CERT_P12         base64 des „Developer ID Application“-Zertifikats (.p12)
#   MACOS_CERT_PASSWORD    Passwort dieses .p12
#   KEYCHAIN_PASSWORD      beliebiges Passwort für den temporären Schlüsselbund
#   NOTARY_KEY_P8          base64 des App-Store-Connect-API-Schlüssels (.p8)
#   NOTARY_KEY_ID          Key-ID des API-Schlüssels
#   NOTARY_ISSUER          Issuer-ID (App Store Connect)
#   SPARKLE_ED_PRIVATE_KEY privater EdDSA-Schlüssel (Ausgabe von generate_keys -x)
#
# HINWEIS: Bei öffentlichem Repo sind die Logs öffentlich. Der Schritt „Build“
# maskiert Signatur-Identität, Klarnamen und Team-ID via ::add-mask:: – prüfe den
# ersten Lauf trotzdem einmal auf versehentliche Klartext-Ausgaben.

on:
  push:
    tags: ["v*"]
  # Manueller Trockenlauf: baut/signiert/notarisiert vollständig, veröffentlicht
  # aber NICHTS (der Publish-Schritt läuft nur bei einem Tag-Push). Damit lässt
  # sich einmalig prüfen, dass die Klarnamen-Maskierung im öffentlichen Log greift.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # volle Historie: Build-Nummer = Commit-Anzahl

      - name: Xcode auswählen
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: create-dmg installieren
        run: npm install -g --allow-scripts=fs-xattr,macos-alias create-dmg

      - name: Build, signieren, notarisieren, Appcast erzeugen
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          NOTARY_KEY_P8: ${{ secrets.NOTARY_KEY_P8 }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER: ${{ secrets.NOTARY_ISSUER }}
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          # ── Temporären Schlüsselbund anlegen und Zertifikat importieren ──
          KC="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KC"
          echo "$MACOS_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KC" -P "$MACOS_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KC" >/dev/null
          security list-keychains -d user -s "$KC" \
            $(security list-keychains -d user | tr -d '"')

          # ── Klarname/Identität/Team-ID im öffentlichen Log maskieren ──
          IDENTITY="$(security find-identity -v -p codesigning "$KC" \
            | awk -F'"' '/Developer ID Application/{print $2; exit}')"
          NAME="${IDENTITY#Developer ID Application: }"   # „Name (TEAMID)“
          echo "::add-mask::$IDENTITY"
          echo "::add-mask::$NAME"
          echo "::add-mask::${NAME% (*}"                  # Name ohne Team
          echo "::add-mask::$(sed -n 's/.*(\([A-Z0-9]\{10\}\)).*/\1/p' <<<"$NAME")"

          # ── API-Key + Sparkle-EdDSA-Key als Dateien bereitstellen ──
          echo "$NOTARY_KEY_P8" | base64 --decode > "$RUNNER_TEMP/notary.p8"
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" > "$RUNNER_TEMP/sparkle_ed_priv"

          # ── Release-Pipeline (auto-detektiert Identität aus dem Schlüsselbund) ──
          NOTARY_KEY="$RUNNER_TEMP/notary.p8" \
          SPARKLE_ED_KEY_FILE="$RUNNER_TEMP/sparkle_ed_priv" \
            ./scripts/release.sh

          DMG="$(ls "$HOME/Library/Caches/LogbuchLoaderRelease/dist/"*.dmg | head -1)"
          echo "DMG_PATH=$DMG" >> "$GITHUB_ENV"
          echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Release veröffentlichen + Appcast committen
        # Nur bei Tag-Push veröffentlichen. Ein manueller Trockenlauf
        # (workflow_dispatch) baut alles, überspringt diesen Schritt aber.
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" "$DMG_PATH" \
            --title "$GITHUB_REF_NAME" \
            --notes-file <(python3 scripts/changelog_to_html.py "$APP_VERSION" CHANGELOG.md --raw) \
            --latest

          git config user.name "Supapilot"
          git config user.email "hello@supapilot.dev"
          git fetch origin main
          git switch main
          git add docs/appcast.xml
          git commit -m "Appcast v$APP_VERSION" || echo "Appcast unverändert."
          git push origin main
